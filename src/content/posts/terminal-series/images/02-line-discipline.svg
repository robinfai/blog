<svg xmlns="http://www.w3.org/2000/svg" width="720" height="900" viewBox="0 0 720 900" role="img" aria-labelledby="title desc">
  <title id="title">TTY Line Discipline 处理输入</title>
  <desc id="desc">输入字节依次经过回显、规范模式、控制字符与信号处理，最后成为文本或信号</desc>
  <rect width="720" height="900" fill="#ebe7dc"/>
  <text x="56" y="64" fill="#69706b" font-family="system-ui,sans-serif" font-size="18" letter-spacing="3">TTY · MORE THAN A BYTE STREAM</text>
  <g font-family="system-ui,sans-serif">
    <rect x="70" y="110" width="580" height="120" rx="4" fill="#fbfaf6" stroke="#cbc5b8" stroke-width="2"/>
    <text x="100" y="151" fill="#2d7e82" font-size="17" font-weight="800">输入字节</text>
    <text x="100" y="198" fill="#171916" font-family="monospace" font-size="28">Ctrl-C · a · b · Enter</text>
    <path d="M360 230v58" stroke="#2d7e82" stroke-width="4"/>
    <path d="m348 274 12 15 12-15" fill="none" stroke="#2d7e82" stroke-width="4"/>

    <rect x="70" y="290" width="580" height="310" rx="4" fill="#171b1b"/>
    <text x="100" y="340" fill="#8bc2bb" font-size="18" font-weight="800" letter-spacing="2">LINE DISCIPLINE</text>
    <text x="100" y="386" fill="#f4f0e7" font-size="32" font-weight="800">内核中的终端行为</text>
    <g font-size="19" font-weight="700">
      <rect x="100" y="432" width="240" height="58" rx="3" fill="#2d3734"/><text x="126" y="469" fill="#dce8e4">Echo · 输入回显</text>
      <rect x="380" y="432" width="240" height="58" rx="3" fill="#2d3734"/><text x="406" y="469" fill="#dce8e4">Canonical · 行编辑</text>
      <rect x="100" y="516" width="240" height="58" rx="3" fill="#2d3734"/><text x="126" y="553" fill="#dce8e4">Control characters</text>
      <rect x="380" y="516" width="240" height="58" rx="3" fill="#2d3734"/><text x="406" y="553" fill="#dce8e4">Signals · 作业控制</text>
    </g>
    <path d="M360 600v58" stroke="#2d7e82" stroke-width="4"/>
    <path d="m348 644 12 15 12-15" fill="none" stroke="#2d7e82" stroke-width="4"/>

    <rect x="70" y="660" width="270" height="130" rx="4" fill="#dce9e6" stroke="#79aaa6" stroke-width="2"/>
    <text x="98" y="704" fill="#2d7e82" font-size="17" font-weight="800">路径 A</text>
    <text x="98" y="750" fill="#171916" font-size="25" font-weight="800">一行文本</text>
    <rect x="380" y="660" width="270" height="130" rx="4" fill="#f2e4d2" stroke="#d0b184" stroke-width="2"/>
    <text x="408" y="704" fill="#ad6a26" font-size="17" font-weight="800">路径 B</text>
    <text x="408" y="750" fill="#171916" font-size="25" font-weight="800">SIGINT 等信号</text>
    <path d="M360 620 205 660M360 620l155 40" stroke="#2d7e82" stroke-width="3" fill="none"/>
    <text x="70" y="842" fill="#69706b" font-size="18">Raw 模式会关闭其中的大部分处理，把解释权交还给应用。</text>
  </g>
</svg>
