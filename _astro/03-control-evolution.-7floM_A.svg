<svg xmlns="http://www.w3.org/2000/svg" width="720" height="1040" viewBox="0 0 720 1040" role="img" aria-labelledby="title desc">
  <title id="title">终端控制序列的演进</title>
  <desc id="desc">从纸面终端的单字节控制字符，到视频终端的参数序列，再到现代终端扩展</desc>
  <rect width="720" height="1040" fill="#ebe7dc"/>
  <text x="56" y="62" fill="#69706b" font-family="system-ui,sans-serif" font-size="18" letter-spacing="3">WHY CONTROL SEQUENCES GREW</text>
  <g font-family="system-ui,sans-serif">
    <rect x="66" y="104" width="588" height="224" rx="4" fill="#fbfaf6" stroke="#cbc5b8" stroke-width="2"/>
    <text x="98" y="145" fill="#92704c" font-size="16" font-weight="800">PAPER TERMINAL</text>
    <text x="98" y="194" fill="#171916" font-size="32" font-weight="800">少量单字节控制</text>
    <rect x="98" y="218" width="524" height="54" rx="3" fill="#efede6"/>
    <text x="360" y="253" fill="#555950" text-anchor="middle" font-family="ui-monospace,monospace" font-size="23">CR · LF · BS · BEL</text>
    <text x="98" y="303" fill="#686b63" font-size="18">回车、换行、退格和响铃已经够用</text>

    <path d="M360 328v70" stroke="#2d7e82" stroke-width="4"/>
    <path d="m348 384 12 15 12-15" fill="none" stroke="#2d7e82" stroke-width="4"/>
    <text x="382" y="373" fill="#2d7e82" font-size="15">屏幕可以反复更新</text>

    <rect x="66" y="400" width="588" height="246" rx="4" fill="#f2e4d2" stroke="#d0b184" stroke-width="2"/>
    <text x="98" y="441" fill="#ad6a26" font-size="16" font-weight="800">VIDEO TERMINAL</text>
    <text x="98" y="490" fill="#171916" font-size="32" font-weight="800">可携带参数的序列</text>
    <rect x="98" y="516" width="524" height="62" rx="3" fill="#171b1b"/>
    <text x="360" y="556" fill="#f4f0e7" text-anchor="middle" font-family="ui-monospace,monospace" font-size="25">ESC [ 12 ; 30 H</text>
    <text x="98" y="611" fill="#686b63" font-size="18">表达位置、范围、模式和显示属性</text>

    <path d="M360 646v70" stroke="#2d7e82" stroke-width="4"/>
    <path d="m348 702 12 15 12-15" fill="none" stroke="#2d7e82" stroke-width="4"/>
    <text x="382" y="691" fill="#2d7e82" font-size="15">宿主能力继续增加</text>

    <rect x="66" y="718" width="588" height="250" rx="4" fill="#dce9e6" stroke="#79aaa6" stroke-width="2"/>
    <text x="98" y="759" fill="#2d7e82" font-size="16" font-weight="800">MODERN EMULATOR</text>
    <text x="98" y="808" fill="#171916" font-size="32" font-weight="800">开放式控制结构</text>
    <g font-family="ui-monospace,monospace" font-size="24" font-weight="700" text-anchor="middle">
      <rect x="98" y="834" width="158" height="64" rx="3" fill="#fbfaf6" stroke="#79aaa6"/>
      <text x="177" y="874" fill="#2d7e82">CSI</text>
      <rect x="281" y="834" width="158" height="64" rx="3" fill="#fbfaf6" stroke="#d0b184"/>
      <text x="360" y="874" fill="#ad6a26">OSC</text>
      <rect x="464" y="834" width="158" height="64" rx="3" fill="#fbfaf6" stroke="#997baa"/>
      <text x="543" y="874" fill="#73528a">DCS</text>
    </g>
    <text x="98" y="941" fill="#686b63" font-size="18">颜色、光标、标题、超链接和图形仍走同一条流</text>
  </g>
  <text x="56" y="1012" fill="#69706b" font-family="system-ui,sans-serif" font-size="17">控制需求变多后，协议从固定动作扩展为可解析的序列。</text>
</svg>
