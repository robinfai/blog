  <g font-family="system-ui,sans-serif" font-size="15" text-anchor="middle">
    <text x="239" y="309" fill="#78b8b0">ESC + CSI</text>
    <text x="487" y="309" fill="#c9a85d">PARAMETER</text>
    <text x="586" y="309" fill="#b58bcf">FINAL</text>
    <text x="784" y="309" fill="#aeb8b4">TEXT</text>
  </g>
  <path d="M600 338v62" stroke="#5f746f" stroke-width="4"/>
  <path d="m588 388 12 14 12-14" fill="none" stroke="#5f746f" stroke-width="4"/>
