  <circle cx="139" cy="117" r="8" fill="#d7a24c"/>
  <circle cx="165" cy="117" r="8" fill="#66a967"/>
  <text x="1078" y="123" text-anchor="end" fill="#83908b" font-family="ui-monospace,monospace" font-size="14">byte-stream</text>
  <g font-family="ui-monospace,monospace" font-size="21" text-anchor="middle">
