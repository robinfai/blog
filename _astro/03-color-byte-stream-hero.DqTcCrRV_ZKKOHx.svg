    <text x="388" y="253" fill="#e4c06b">33</text>
    <rect x="444" y="211" width="86" height="68" rx="7" fill="#332f25" stroke="#816d42"/>
    <text x="487" y="253" fill="#e4c06b">31</text>
    <rect x="543" y="211" width="86" height="68" rx="7" fill="#30273a" stroke="#74558e"/>
    <text x="586" y="253" fill="#d2a3ed">6D</text>
    <rect x="642" y="211" width="86" height="68" rx="7" fill="#242b2a" stroke="#465451"/>
    <text x="685" y="253" fill="#f4f0e7">72</text>
