<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">同一条字节流显示为彩色文字</title>
  <desc id="desc">终端解析器把控制序列解释为显示状态，把普通字符绘制成红色文字</desc>
  <rect width="1200" height="675" fill="#ebe7dc"/>
  <text x="76" y="58" fill="#69706b" font-family="system-ui,sans-serif" font-size="18" letter-spacing="4">ONE BYTE STREAM · TWO MEANINGS</text>
  <rect x="76" y="88" width="1048" height="514" rx="18" fill="#171b1b"/>
  <rect x="76" y="88" width="1048" height="58" rx="18" fill="#242b2a"/>
  <rect x="76" y="128" width="1048" height="18" fill="#242b2a"/>
