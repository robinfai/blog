<svg xmlns="http://www.w3.org/2000/svg" width="720" height="1120" viewBox="0 0 720 1120" role="img" aria-labelledby="title desc">
  <title id="title">现代终端会话中的 PTY 数据流</title>
  <desc id="desc">从键盘与屏幕经过终端模拟器、PTY master 和 slave 到 Shell 与前台程序的双向链路</desc>
  <rect width="720" height="1120" fill="#ebe7dc"/>
  <text x="56" y="64" fill="#69706b" font-family="system-ui,sans-serif" font-size="18" letter-spacing="3">A MODERN TERMINAL SESSION</text>
  <g font-family="system-ui,sans-serif">
    <rect x="76" y="104" width="568" height="150" rx="4" fill="#fbfaf6" stroke="#cbc5b8" stroke-width="2"/>
    <text x="108" y="145" fill="#2d7e82" font-size="16" font-weight="800">01 · USER SIDE</text>
    <text x="108" y="193" fill="#171916" font-size="33" font-weight="800">键盘与屏幕</text>
    <text x="108" y="226" fill="#686b63" font-size="20">人的输入与视觉反馈</text>
    <path d="M360 254v58" stroke="#2d7e82" stroke-width="4"/>
    <path d="m348 298 12 15 12-15m-24-25 12-15 12 15" fill="none" stroke="#2d7e82" stroke-width="4"/>

    <rect x="76" y="314" width="568" height="160" rx="4" fill="#f2e4d2" stroke="#d0b184" stroke-width="2"/>
    <text x="108" y="356" fill="#ad6a26" font-size="16" font-weight="800">02 · SOFTWARE ENDPOINT</text>
    <text x="108" y="405" fill="#171916" font-size="33" font-weight="800">Terminal Emulator</text>
    <text x="108" y="440" fill="#686b63" font-size="20">编码按键 · 解析输出 · 渲染像素</text>
    <path d="M360 474v58" stroke="#2d7e82" stroke-width="4"/>
    <path d="m348 518 12 15 12-15m-24-25 12-15 12 15" fill="none" stroke="#2d7e82" stroke-width="4"/>

    <rect x="76" y="534" width="568" height="300" rx="4" fill="#171b1b"/>
    <text x="108" y="578" fill="#8bc2bb" font-size="16" font-weight="800">03 · PSEUDO TERMINAL PAIR</text>
    <rect x="108" y="614" width="504" height="78" rx="3" fill="#2d3734" stroke="#54716c"/>
    <text x="137" y="647" fill="#bcd0cb" font-size="15">CONTROL SIDE</text>
    <text x="137" y="678" fill="#f4f0e7" font-size="25" font-weight="800">PTY master</text>
    <path d="M360 692v50" stroke="#85c5bd" stroke-width="4"/>
    <path d="m348 728 12 15 12-15m-24-22 12-14 12 14" fill="none" stroke="#85c5bd" stroke-width="4"/>
    <text x="382" y="724" fill="#85c5bd" font-size="15">bidirectional bytes</text>
    <rect x="108" y="744" width="504" height="64" rx="3" fill="#2d3734" stroke="#54716c"/>
    <text x="137" y="784" fill="#f4f0e7" font-size="25" font-weight="800">PTY slave</text>
    <text x="454" y="783" fill="#bcd0cb" font-size="15">TTY 语义端</text>
    <path d="M360 834v58" stroke="#2d7e82" stroke-width="4"/>
    <path d="m348 878 12 15 12-15m-24-25 12-15 12 15" fill="none" stroke="#2d7e82" stroke-width="4"/>

    <rect x="76" y="894" width="568" height="150" rx="4" fill="#dce9e6" stroke="#79aaa6" stroke-width="2"/>
    <text x="108" y="936" fill="#2d7e82" font-size="16" font-weight="800">04 · APPLICATION SIDE</text>
    <text x="108" y="984" fill="#171916" font-size="33" font-weight="800">Shell 与前台进程</text>
    <text x="108" y="1018" fill="#686b63" font-size="20">仍像连接着一台传统物理终端</text>
    <text x="76" y="1080" fill="#69706b" font-size="18">终端模拟器连接 master；Shell 和前台进程连接 slave。</text>
  </g>
</svg>
