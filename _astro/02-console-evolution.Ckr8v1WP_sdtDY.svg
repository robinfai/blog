<svg xmlns="http://www.w3.org/2000/svg" width="720" height="930" viewBox="0 0 720 930" role="img" aria-labelledby="title desc">
  <title id="title">Console 的形态演进</title>
  <desc id="desc">从机器控制面板到系统控制台、虚拟控制台和现代系统角色</desc>
  <rect width="720" height="930" fill="#ebe7dc"/>
  <text x="58" y="65" fill="#69706b" font-family="system-ui,sans-serif" font-size="18" letter-spacing="3">CONSOLE · A ROLE THAT SURVIVED</text>
  <path d="M110 128v700" stroke="#2d7e82" stroke-width="4"/>
  <g font-family="system-ui,sans-serif">
    <g transform="translate(0 130)">
      <circle cx="110" cy="0" r="17" fill="#ad6a26" stroke="#ebe7dc" stroke-width="8"/>
      <text x="158" y="-10" fill="#ad6a26" font-size="18" font-weight="800">1940s–50s</text>
      <text x="158" y="32" fill="#171916" font-size="31" font-weight="800">机器控制面板</text>
      <text x="158" y="69" fill="#686b63" font-size="21">开关、指示灯与操作员</text>
      <rect x="158" y="90" width="450" height="78" rx="4" fill="#fbfaf6" stroke="#cbc5b8"/>
      <circle cx="195" cy="129" r="12" fill="#ad6a26"/><circle cx="234" cy="129" r="12" fill="#2d7e82"/>
      <path d="M278 116h288M278 142h210" stroke="#b9b4a8" stroke-width="8"/>
    </g>
    <g transform="translate(0 350)">
      <circle cx="110" cy="0" r="17" fill="#ad6a26" stroke="#ebe7dc" stroke-width="8"/>
      <text x="158" y="-10" fill="#ad6a26" font-size="18" font-weight="800">1960s–70s</text>
      <text x="158" y="32" fill="#171916" font-size="31" font-weight="800">系统控制台</text>
      <text x="158" y="69" fill="#686b63" font-size="21">键盘、打印机或视频屏幕</text>
      <rect x="158" y="90" width="450" height="78" rx="4" fill="#171b1b"/>
      <text x="184" y="139" fill="#9bd0c7" font-family="monospace" font-size="20">SYSTEM READY_</text>
    </g>
    <g transform="translate(0 570)">
      <circle cx="110" cy="0" r="17" fill="#2d7e82" stroke="#ebe7dc" stroke-width="8"/>
      <text x="158" y="-10" fill="#2d7e82" font-size="18" font-weight="800">1980s–90s</text>
      <text x="158" y="32" fill="#171916" font-size="31" font-weight="800">虚拟控制台</text>
      <text x="158" y="69" fill="#686b63" font-size="21">一套硬件切换多个会话</text>
      <g transform="translate(158 90)">
        <rect width="132" height="78" fill="#fbfaf6" stroke="#cbc5b8"/><rect x="148" width="132" height="78" fill="#fbfaf6" stroke="#cbc5b8"/><rect x="296" width="132" height="78" fill="#fbfaf6" stroke="#cbc5b8"/>
        <text x="25" y="48" font-size="18">tty1</text><text x="173" y="48" font-size="18">tty2</text><text x="321" y="48" font-size="18">tty3</text>
      </g>
    </g>
    <g transform="translate(0 790)">
      <circle cx="110" cy="0" r="17" fill="#2d7e82" stroke="#ebe7dc" stroke-width="8"/>
      <text x="158" y="-10" fill="#2d7e82" font-size="18" font-weight="800">TODAY</text>
      <text x="158" y="32" fill="#171916" font-size="31" font-weight="800">系统指定入口</text>
      <text x="158" y="69" fill="#686b63" font-size="21">启动、系统消息与故障恢复入口</text>
    </g>
  </g>
</svg>
