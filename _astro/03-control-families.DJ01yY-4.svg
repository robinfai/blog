<svg xmlns="http://www.w3.org/2000/svg" width="720" height="1260" viewBox="0 0 720 1260" role="img" aria-labelledby="title desc">
  <title id="title">CSI、OSC 与 DCS 的结构和用途</title>
  <desc id="desc">CSI 用于参数化控制，OSC 用于宿主字符串命令，DCS 用于设备控制数据</desc>
  <rect width="720" height="1260" fill="#ebe7dc"/>
  <text x="56" y="62" fill="#69706b" font-family="system-ui,sans-serif" font-size="18" letter-spacing="3">THREE CONTROL FAMILIES</text>
  <g font-family="system-ui,sans-serif">
    <rect x="66" y="104" width="588" height="316" rx="4" fill="#fbfaf6" stroke="#79aaa6" stroke-width="2"/>
    <rect x="66" y="104" width="588" height="78" rx="4" fill="#dce9e6"/>
    <rect x="66" y="168" width="588" height="14" fill="#dce9e6"/>
    <text x="98" y="156" fill="#2d7e82" font-family="ui-monospace,monospace" font-size="34" font-weight="800">CSI</text>
    <text x="622" y="151" text-anchor="end" fill="#527773" font-family="ui-monospace,monospace" font-size="18">ESC [ … final</text>
    <text x="98" y="227" fill="#171916" font-size="27" font-weight="800">参数化的屏幕与模式控制</text>
    <text x="98" y="276" fill="#686b63" font-size="19">m　设置显示属性</text>
    <text x="98" y="316" fill="#686b63" font-size="19">H　移动光标</text>
    <text x="98" y="356" fill="#686b63" font-size="19">J　擦除屏幕</text>
    <text x="98" y="397" fill="#2d7e82" font-size="16">final byte 决定具体操作</text>

    <path d="M360 420v66" stroke="#b2aa9d" stroke-width="3"/>

    <rect x="66" y="486" width="588" height="316" rx="4" fill="#fbfaf6" stroke="#d0b184" stroke-width="2"/>
    <rect x="66" y="486" width="588" height="78" rx="4" fill="#f2e4d2"/>
    <rect x="66" y="550" width="588" height="14" fill="#f2e4d2"/>
    <text x="98" y="538" fill="#ad6a26" font-family="ui-monospace,monospace" font-size="34" font-weight="800">OSC</text>
    <text x="622" y="533" text-anchor="end" fill="#806547" font-family="ui-monospace,monospace" font-size="18">ESC ] … ST</text>
    <text x="98" y="609" fill="#171916" font-size="27" font-weight="800">交给终端宿主的字符串</text>
    <text x="98" y="658" fill="#686b63" font-size="19">修改窗口标题</text>
    <text x="98" y="698" fill="#686b63" font-size="19">声明可点击超链接</text>
    <text x="98" y="738" fill="#686b63" font-size="19">请求剪贴板操作</text>
    <text x="98" y="779" fill="#ad6a26" font-size="16">读取到 ST 或兼容终止符</text>

    <path d="M360 802v66" stroke="#b2aa9d" stroke-width="3"/>

    <rect x="66" y="868" width="588" height="316" rx="4" fill="#fbfaf6" stroke="#9a7cab" stroke-width="2"/>
    <rect x="66" y="868" width="588" height="78" rx="4" fill="#e9e0ec"/>
    <rect x="66" y="932" width="588" height="14" fill="#e9e0ec"/>
    <text x="98" y="920" fill="#73528a" font-family="ui-monospace,monospace" font-size="34" font-weight="800">DCS</text>
    <text x="622" y="915" text-anchor="end" fill="#6f5c78" font-family="ui-monospace,monospace" font-size="18">ESC P … ST</text>
    <text x="98" y="991" fill="#171916" font-size="27" font-weight="800">设备控制或较长数据</text>
    <text x="98" y="1040" fill="#686b63" font-size="19">设备状态查询</text>
    <text x="98" y="1080" fill="#686b63" font-size="19">用户定义键</text>
    <text x="98" y="1120" fill="#686b63" font-size="19">Sixel 等图形数据</text>
    <text x="98" y="1161" fill="#73528a" font-size="16">持续消费数据直到字符串结束</text>
  </g>
  <text x="56" y="1228" fill="#69706b" font-family="system-ui,sans-serif" font-size="17">它们不是三个版本，而是针对不同控制数据设计的三种结构。</text>
</svg>
